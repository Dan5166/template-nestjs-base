services:
  postgres:
    image: postgres:16-alpine
    container_name: template_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-template}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-template}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis is wired into the app in Phase 10 (token blacklist / refresh rotation).
  # It is defined now so `docker compose up` gives you the full stack.
  redis:
    image: redis:7-alpine
    container_name: template_redis
    restart: unless-stopped
    command: >
      sh -c "redis-server --appendonly yes
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
